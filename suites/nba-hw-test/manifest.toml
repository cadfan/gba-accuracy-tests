schema_version = 1

[suite]
name = "nba-hw-test"
description = "NanoBoyAdvance hardware tests: PPU, timer, DMA, IRQ, bus, and halt edge cases"
source = "https://github.com/nba-emu/hw-test"
license = "BSD-3-Clause"
commit = "main"

# These tests use two styles:
# 1. Visual pattern tests (small ROMs): render a specific framebuffer, compare hash
# 2. Console text tests (larger ROMs with test.h framework): print pass/fail summary
# All use stable_frames completion since output is static once rendered.

# ─── PPU tests ───────────────────────────────────────────────

[[tests]]
id = "nba-ppu-bgpd"
rom = "bgpd.gba"
rom_sha256 = "beafeec621abd2dc9dd4cb8e0bf310c2b8c69ee0295945506dc74b19767016c3"
subsystem = "ppu"
max_frames = 600
timing_sensitive = true
requires_bios = false
hint = "BG2PD double-buffering via HBlank DMA. Visual: gradient stripes should be evenly spaced."

[tests.completion]
type = "stable_frames"
window = 10
min_frames = 30

