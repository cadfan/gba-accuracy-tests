schema_version = 1

[suite]
name = "armwrestler"
description = "ARMWrestler: ARM/Thumb instruction tests (6 suites)"
source = "https://github.com/destoer/armwrestler-gba-fixed"
commit = "802e55ad61b421f4bbbc6f74f96aa4e5df4d630f"

# Menu has 6 items selected with DOWN, run with START.
# GBA KEYINPUT bits: START=8 (bit 3), DOWN=128 (bit 7)
#
# Input timing: ARMWrestler clears EWRAM during init (~30 frames).
# Menu rendering takes ~10 more. Main loop iterates every ~5 frames.
# Keys held 10 frames, 15-frame spacing between inputs for edge detect.
# First input at frame 100 to ensure menu is fully ready.

[[tests]]
id = "armwrestler-arm-alu"
rom = "armwrestler-gba-fixed.gba"
rom_sha256 = "9f08d807c03ef296d38ef73e9b827a3d8c77cead9ced44b07d64c10f5f7d0746"
subsystem = "cpu-arm"
max_frames = 500
timing_sensitive = false
requires_bios = false
hint = "ARM ALU tests. Menu item 0 (default)."

[tests.completion]
type = "input_then_stable"
window = 15
min_frames = 130

[[tests.input]]
frame = 100
keys = 8  # START

[[tests]]
id = "armwrestler-arm-ldr-str"
rom = "armwrestler-gba-fixed.gba"
rom_sha256 = "9f08d807c03ef296d38ef73e9b827a3d8c77cead9ced44b07d64c10f5f7d0746"
subsystem = "cpu-arm"
max_frames = 500
timing_sensitive = false
requires_bios = false
hint = "ARM Load/Store tests. Menu item 1."

[tests.completion]
type = "input_then_stable"
window = 15
min_frames = 150

[[tests.input]]
frame = 100
keys = 128  # DOWN

[[tests.input]]
frame = 120
keys = 8   # START

[[tests]]
id = "armwrestler-arm-ldm-stm"
rom = "armwrestler-gba-fixed.gba"
rom_sha256 = "9f08d807c03ef296d38ef73e9b827a3d8c77cead9ced44b07d64c10f5f7d0746"
subsystem = "cpu-arm"
max_frames = 500
timing_sensitive = false
requires_bios = false
