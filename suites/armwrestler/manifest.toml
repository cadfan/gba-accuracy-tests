schema_version = 1

[suite]
name = "armwrestler"
description = "ARMWrestler: ARM/Thumb instruction tests (6 suites)"
source = "https://github.com/destoer/armwrestler-gba-fixed"
commit = "802e55ad61b421f4bbbc6f74f96aa4e5df4d630f"

# Menu has 6 items selected with DOWN, run with START.
# GBA KEYINPUT bits: START=8 (bit 3), DOWN=128 (bit 7)
# NOTE: License for ARMWrestler is unclear/unstated in the original repo.

[[tests]]
id = "armwrestler-arm-alu"
rom = "armwrestler-gba-fixed.gba"
rom_sha256 = "9f08d807c03ef296d38ef73e9b827a3d8c77cead9ced44b07d64c10f5f7d0746"
subsystem = "cpu-arm"
max_frames = 300
timing_sensitive = false
requires_bios = false
hint = "ARM ALU tests (ADC, AND, BIC, CMN, EOR, MOV, MVN, RSC, SBC, MLA, MUL, MULL, SMULL). Menu item 0 (default)."

[tests.completion]
type = "input_then_stable"
window = 15
min_frames = 30

[[tests.input]]
frame = 5
keys = 8  # START (selects default first menu item)

[[tests]]
id = "armwrestler-arm-ldr-str"
rom = "armwrestler-gba-fixed.gba"
rom_sha256 = "9f08d807c03ef296d38ef73e9b827a3d8c77cead9ced44b07d64c10f5f7d0746"
subsystem = "cpu-arm"
max_frames = 300
timing_sensitive = false
requires_bios = false
hint = "ARM Load/Store tests (LDR variants). Menu item 1 (1 DOWN then START)."

[tests.completion]
type = "input_then_stable"
window = 15
min_frames = 30

[[tests.input]]
frame = 5
keys = 128  # DOWN

[[tests.input]]
frame = 10
keys = 8   # START

[[tests]]
id = "armwrestler-arm-ldm-stm"
rom = "armwrestler-gba-fixed.gba"
rom_sha256 = "9f08d807c03ef296d38ef73e9b827a3d8c77cead9ced44b07d64c10f5f7d0746"
subsystem = "cpu-arm"
max_frames = 300
timing_sensitive = false
requires_bios = false
hint = "ARM Block transfer tests (LDM/STM). Menu item 2 (2 DOWNs then START)."

[tests.completion]
type = "input_then_stable"
window = 15
min_frames = 30

[[tests.input]]
frame = 5
keys = 128  # DOWN

[[tests.input]]
frame = 10
keys = 128  # DOWN

[[tests.input]]
frame = 15
keys = 8   # START

[[tests]]
id = "armwrestler-thumb-alu"
rom = "armwrestler-gba-fixed.gba"
