schema_version = 1

[suite]
name = "ags-aging"
description = "Nintendo AGS Aging Cartridge: official hardware validation tests (Memory, LCD, Timer, DMA, COM, Key Input, Interrupt)"
source = "Nintendo official (not publicly available)"

# NOTE: This ROM cannot be auto-downloaded. You must manually place the AGS
# Aging Cartridge ROM at roms/ags-aging/ags-aging.gba. The ROM requires the
# official Nintendo GBA BIOS to run (set GBA_BIOS_PATH environment variable).
#
# Test sections in order:
#   Memory (9 subtests), LCD (7), Timer (3), DMA (9),
#   COM (N/A - skip), Key Input (1), Interrupt (7)
#
# The ROM runs all tests sequentially. Each section displays pass/fail.
# Captured at frame 2000 where all test sections have completed.

[[tests]]
id = "ags-aging-full"
rom = "ags-aging.gba"
rom_sha256 = ""
subsystem = "system"
max_frames = 3000
timing_sensitive = false
requires_bios = true
bios = "official"
hint = "Nintendo AGS Aging Cartridge. Requires official GBA BIOS (GBA_BIOS_PATH). ROM must be manually provided."

[tests.completion]
type = "exact_frame"
frame = 2000
