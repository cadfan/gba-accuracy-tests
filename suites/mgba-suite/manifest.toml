schema_version = 1

[suite]
name = "mgba-suite"
description = "mgba-emu/suite: memory, IO, timing, DMA, shifter, carry, BIOS, video, and edge case tests"
source = "https://github.com/mgba-emu/suite"
# ROM sourced from Asphaltian/sgba mirror — the upstream repo has no
# pre-built release. sha256 = 2748b498310e77a4ec7f0c89459fa9d61986284977fa801d18f0564c83b7ebb6
commit = "mirror:Asphaltian/sgba@main"

# Menu has 14 items. Selection is via DOWN/UP, entry via A, back via B.
# The suite runs all sub-tests of a category when A is pressed, then
# displays a "passes / total" summary that's stable. Each sub-test entry
# below drives down the correct number of times and presses A.
#
# Timing: bare-metal suite boots fast under HLE (~20 frames). With real
# BIOS, add ~180 frames for the Nintendo logo animation. The input
# schedule below is HLE-anchored; generate_refs shifts it by
# OFFICIAL_BIOS_BOOT_OFFSET automatically.
#
# GBA KEYINPUT bits: A=1 (bit 0), DOWN=128 (bit 7), UP=64 (bit 6)

[[tests]]
id = "mgba-suite-memory"
rom = "suite.gba"
rom_sha256 = "2748b498310e77a4ec7f0c89459fa9d61986284977fa801d18f0564c83b7ebb6"
subsystem = "memory"
max_frames = 2400
timing_sensitive = false
requires_bios = false
hint = "Memory test suite (menu item 0, default). Captures the pass/total summary."

[tests.completion]
type = "input_then_stable"
window = 30
min_frames = 400

[[tests.input]]
frame = 80
keys = 1    # A — enter Memory

[[tests]]
id = "mgba-suite-io-read"
rom = "suite.gba"
rom_sha256 = "2748b498310e77a4ec7f0c89459fa9d61986284977fa801d18f0564c83b7ebb6"
subsystem = "io"
max_frames = 2400
timing_sensitive = false
requires_bios = false
hint = "IO register read test suite (menu item 1)."

